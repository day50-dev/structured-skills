<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>strusky</title>
<style>
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #252540;
  --border: #2a2a45;
  --text: #e0e0f0;
  --text2: #9090b0;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --green: #00b894;
  --red: #e17055;
  --orange: #fdcb6e;
  --radius: 8px;
  --font: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
  --ui-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--ui-font);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
header h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
header h1 span { color: var(--accent2); }
header .actions { display: flex; gap: 8px; }

/* Layout */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Sidebar */
.sidebar {
  width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.sidebar-header {
  padding: 12px 16px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
}
.agent-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}
.agent-item {
  padding: 8px 16px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
  border-left: 3px solid transparent;
}
.agent-item:hover { background: var(--surface2); color: var(--text); }
.agent-item.active {
  background: var(--surface2);
  color: var(--text);
  border-left-color: var(--accent);
}
.agent-item .icon { font-size: 14px; opacity: 0.6; }
.agent-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.agent-item .badge {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 10px;
  background: var(--surface2);
  color: var(--text2);
}
.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text2);
}

/* Main */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}
.main-placeholder {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text2);
  font-size: 14px;
}
.main-placeholder .inner { text-align: center; }
.main-placeholder .inner .big-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }

/* Tabs */
.tab-bar {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tab-btn {
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 500;
  background: none;
  border: none;
  color: var(--text2);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  font-family: var(--ui-font);
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  color: var(--accent2);
  border-bottom-color: var(--accent);
}
.tab-content { flex: 1; overflow: auto; display: none; padding: 20px; }
.tab-content.active { display: block; }

/* View Tab */
.code-view {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
  overflow: auto;
  max-height: calc(100vh - 200px);
  color: var(--text);
}
.code-view .line-number {
  display: inline-block;
  width: 32px;
  color: var(--text2);
  opacity: 0.5;
  user-select: none;
}

/* Edit Tab */
.edit-area {
  width: 100%;
  min-height: 400px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.6;
  padding: 16px;
  resize: vertical;
  outline: none;
}
.edit-area:focus { border-color: var(--accent); }

/* Run Tab */
.run-prompt-area {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.run-prompt-area input {
  flex: 1;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 13px;
  font-family: var(--ui-font);
  outline: none;
}
.run-prompt-area input:focus { border-color: var(--accent); }
.run-output {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
  overflow: auto;
  max-height: calc(100vh - 280px);
}
.run-output .reg-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font);
  font-size: 12px;
}
.run-output .reg-table th, .run-output .reg-table td {
  padding: 6px 10px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.run-output .reg-table th {
  color: var(--text2);
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.run-output .reg-table td { color: var(--text); word-break: break-all; }
.run-output .reg-table tr:hover td { background: var(--surface2); }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius);
  border: none;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--ui-font);
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-secondary { background: var(--surface2); color: var(--text); }
.btn-secondary:hover { background: var(--border); }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { opacity: 0.85; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Modal */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  width: 520px;
  max-width: 90vw;
  max-height: 80vh;
  overflow: auto;
}
.modal h2 { font-size: 16px; margin-bottom: 16px; }
.modal p { font-size: 13px; color: var(--text2); margin-bottom: 16px; line-height: 1.5; }
.modal textarea {
  width: 100%;
  min-height: 100px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--ui-font);
  font-size: 13px;
  padding: 12px;
  resize: vertical;
  outline: none;
  margin-bottom: 16px;
}
.modal textarea:focus { border-color: var(--accent); }
.modal .btns { display: flex; gap: 8px; justify-content: flex-end; }

/* Status / Toast */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--surface2);
  color: var(--text);
  padding: 10px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  border: 1px solid var(--border);
  z-index: 200;
  opacity: 0;
  transition: all 0.3s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { border-color: var(--red); }
.toast.success { border-color: var(--green); }

/* Spinner */
.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid var(--text2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Token info */
.token-info {
  font-size: 11px;
  color: var(--text2);
  margin-top: 8px;
  padding: 6px 10px;
  background: var(--surface2);
  border-radius: var(--radius);
  display: inline-block;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text2); }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px;
  color: var(--text2);
}
.empty-state .icon { font-size: 36px; margin-bottom: 12px; opacity: 0.3; }
.empty-state p { font-size: 13px; line-height: 1.6; }

/* Loading overlay on agent list */
.loading-dots::after {
  content: '';
  animation: dots 1.5s steps(4, end) infinite;
}
@keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }
</style>
</head>
<body>

<header>
  <h1><span>◈</span> strusky</h1>
  <div class="actions">
    <button class="btn btn-primary" onclick="openCreateModal()">+ New Agent</button>
    <button class="btn btn-secondary" onclick="refreshList()">⟳</button>
  </div>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">Agents</div>
    <div class="agent-list" id="agentList"></div>
    <div class="sidebar-footer" id="agentCount">0 agents</div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="main-placeholder" id="placeholder">
      <div class="inner">
        <div class="big-icon">◈</div>
        <p>Select an agent from the sidebar</p>
        <p style="font-size:12px;margin-top:8px;opacity:0.6">or create a new one</p>
      </div>
    </div>

    <div id="mainContent" style="display:none;flex:1;display:none;flex-direction:column">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('view')" id="tabView">View</button>
        <button class="tab-btn" onclick="switchTab('edit')" id="tabEdit">Edit</button>
        <button class="tab-btn" onclick="switchTab('run')" id="tabRun">Run</button>
      </div>

      <!-- View -->
      <div class="tab-content active" id="panelView">
        <div id="viewHeader" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <span id="viewName" style="font-size:15px;font-weight:600"></span>
          <span id="viewPath" style="font-size:11px;color:var(--text2)"></span>
        </div>
        <div class="code-view" id="codeView"></div>
      </div>

      <!-- Edit -->
      <div class="tab-content" id="panelEdit">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <span style="font-size:15px;font-weight:600">Edit</span>
          <div style="display:flex;gap:8px">
            <button class="btn btn-primary btn-sm" onclick="saveAgent()" id="saveBtn">Save</button>
            <button class="btn btn-secondary btn-sm" onclick="switchTab('view')">Cancel</button>
          </div>
        </div>
        <textarea class="edit-area" id="editArea" spellcheck="false"></textarea>
      </div>

      <!-- Run -->
      <div class="tab-content" id="panelRun">
        <div style="margin-bottom:12px">
          <div style="font-size:15px;font-weight:600;margin-bottom:8px">Run Agent</div>
          <div class="run-prompt-area">
            <input type="text" id="runPrompt" placeholder="Enter prompt for the agent..." onkeydown="if(event.key==='Enter') runAgent()">
            <button class="btn btn-primary" onclick="runAgent()" id="runBtn">Run</button>
          </div>
        </div>
        <div id="runOutputArea" style="display:none">
          <div id="runTokens" class="token-info"></div>
          <div class="run-output" id="runOutput"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Create Modal -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <h2>Create New Agent</h2>
    <p>Describe what you want the agent to do. The LLM will generate a <code>.ss</code> script.</p>
    <textarea id="createPrompt" placeholder="e.g. make a research agent that searches the web and writes reports" rows="4"></textarea>
    <div class="btns">
      <button class="btn btn-secondary" onclick="closeCreateModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createAgent()" id="createBtn">Generate</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// State
let agents = [];
let currentAgent = null;
let currentTab = 'view';

// Init
document.addEventListener('DOMContentLoaded', () => {
  refreshList();
});

// API helpers
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(path, opts);
  return res.json();
}

// Agent list
async function refreshList() {
  const list = document.getElementById('agentList');
  list.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text2);font-size:12px"><span class="spinner"></span></div>';
  const data = await api('GET', '/api/agents');
  agents = data.agents || [];
  renderList();
  if (currentAgent) {
    const stillExists = agents.find(a => a.name === currentAgent.name);
    if (!stillExists) {
      clearMain();
    } else {
      selectAgent(currentAgent.name);
    }
  }
}

function renderList() {
  const list = document.getElementById('agentList');
  document.getElementById('agentCount').textContent = `${agents.length} agent${agents.length !== 1 ? 's' : ''}`;
  if (agents.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">◈</div><p>No agents yet.<br>Create one to get started.</p></div>';
    return;
  }
  list.innerHTML = agents.map(a => {
    const active = currentAgent && a.name === currentAgent.name ? 'active' : '';
    const icon = a.path.startsWith('examples') ? '📖' : a.path.startsWith('agents') ? '⚡' : '📄';
    return `<div class="agent-item ${active}" onclick="selectAgent('${a.name}')">
      <span class="icon">${icon}</span>
      <span class="name">${escHtml(a.name)}</span>
    </div>`;
  }).join('');
}

// Agent selection
async function selectAgent(name) {
  const data = await api('GET', `/api/agents/${encodeURIComponent(name)}`);
  if (data.error) { showToast(data.error, 'error'); return; }
  currentAgent = data;
  document.getElementById('placeholder').style.display = 'none';
  const mc = document.getElementById('mainContent');
  mc.style.display = 'flex';
  document.getElementById('viewName').textContent = data.name;
  document.getElementById('viewPath').textContent = data.path + (data.editable ? '' : ' (read-only)');

  // Code view
  document.getElementById('codeView').textContent = data.content;

  // Edit area
  document.getElementById('editArea').value = data.content;
  document.getElementById('saveBtn').disabled = !data.editable;

  // Clear run output
  document.getElementById('runOutputArea').style.display = 'none';
  document.getElementById('runPrompt').value = '';

  renderList();
  switchTab(currentTab);
}

function clearMain() {
  currentAgent = null;
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('mainContent').style.display = 'none';
  renderList();
}

// Tabs
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active');
  document.getElementById(`panel${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active');
}

// Create agent
function openCreateModal() {
  document.getElementById('createModal').classList.add('open');
  document.getElementById('createPrompt').value = '';
  document.getElementById('createPrompt').focus();
}

function closeCreateModal() {
  document.getElementById('createModal').classList.remove('open');
}

async function createAgent() {
  const prompt = document.getElementById('createPrompt').value.trim();
  if (!prompt) { showToast('Please enter a description', 'error'); return; }
  const btn = document.getElementById('createBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Generating...';
  try {
    const data = await api('POST', '/api/agents', { prompt });
    if (data.error) { showToast(data.error, 'error'); return; }
    closeCreateModal();
    showToast(`Created ${data.name}.ss`, 'success');
    await refreshList();
    selectAgent(data.name);
  } catch (e) {
    showToast('Failed to create agent', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generate';
  }
}

// Edit / Save
async function saveAgent() {
  if (!currentAgent || !currentAgent.editable) return;
  const content = document.getElementById('editArea').value;
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Saving...';
  try {
    const data = await api('PUT', `/api/agents/${encodeURIComponent(currentAgent.name)}`, { content });
    if (data.error) { showToast(data.error, 'error'); return; }
    currentAgent.content = content;
    document.getElementById('codeView').textContent = content;
    showToast('Saved', 'success');
    switchTab('view');
  } catch (e) {
    showToast('Failed to save', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save';
  }
}

// Run
async function runAgent() {
  if (!currentAgent) return;
  const prompt = document.getElementById('runPrompt').value.trim();
  if (!prompt) { showToast('Enter a prompt', 'error'); return; }
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Running...';
  document.getElementById('runOutputArea').style.display = 'none';
  try {
    const data = await api('POST', `/api/agents/${encodeURIComponent(currentAgent.name)}/run`, { prompt });
    if (data.error) { showToast(data.error, 'error'); return; }
    displayRunOutput(data.registers || {}, data.tokens);
  } catch (e) {
    showToast('Failed to run agent', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Run';
  }
}

function displayRunOutput(registers, tokens) {
  const area = document.getElementById('runOutputArea');
  area.style.display = 'block';
  if (tokens && tokens.length > 0) {
    const t = tokens.map(t => `${t.prompt} prompt → ${t.completion} gen → ${t.total} total`).join('  |  ');
    document.getElementById('runTokens').textContent = '⚡ ' + t;
    document.getElementById('runTokens').style.display = 'inline-block';
  } else {
    document.getElementById('runTokens').style.display = 'none';
  }
  const out = document.getElementById('runOutput');
  const keys = Object.keys(registers);
  if (keys.length === 0) {
    out.textContent = '(no registers)';
    return;
  }
  let html = '<table class="reg-table"><thead><tr><th>Register</th><th>Value</th></tr></thead><tbody>';
  for (const key of keys) {
    const val = String(registers[key]);
    const display = val.length > 1000 ? val.slice(0, 997) + '...' : val;
    html += `<tr><td style="white-space:nowrap;color:var(--accent2)">${escHtml(key)}</td><td>${escHtml(display)}</td></tr>`;
  }
  html += '</tbody></table>';
  out.innerHTML = html;
}

// Toast
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || '') + ' show';
  clearTimeout(t._hide);
  t._hide = setTimeout(() => t.classList.remove('show'), 3000);
}

// Util
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
