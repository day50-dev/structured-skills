<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>strusky</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<style>
/* Greyscale syntax highlighting overrides */
.hljs-keyword { color: #b0b0b0 !important; }
.hljs-string { color: #c8c8c8 !important; }
.hljs-number { color: #aaaaaa !important; }
.hljs-comment { color: #666666 !important; font-style: italic; }
.hljs-built_in { color: #bbbbbb !important; }
.hljs-literal { color: #999999 !important; }
.hljs-title { color: #d0d0d0 !important; }
.hljs-attr { color: #b0b0b0 !important; }
.hljs-attribute { color: #b0b0b0 !important; }
.hljs-selector-tag { color: #bbbbbb !important; }
.hljs-type { color: #aaaaaa !important; }
.hljs-section { color: #d0d0d0 !important; }
.hljs-meta { color: #777777 !important; }
.hljs-meta .hljs-keyword { color: #777777 !important; }
.hljs-meta .hljs-string { color: #999999 !important; }
.hljs-addition { color: #8a8a8a !important; }
.hljs-deletion { color: #8a8a8a !important; }
.hljs-link { color: #888888 !important; }
.hljs-template-tag { color: #aaaaaa !important; }
.hljs-template-variable { color: #aaaaaa !important; }
.hljs-variable { color: #c0c0c0 !important; }
.hljs-params { color: #c0c0c0 !important; }
.hljs-symbol { color: #999999 !important; }
.hljs-subst { color: #c0c0c0 !important; }
.hljs-tag { color: #bbbbbb !important; }
.hljs-name { color: #bbbbbb !important; }
.hljs-selector-class { color: #b0b0b0 !important; }
.hljs-selector-id { color: #b0b0b0 !important; }
.hljs-regexp { color: #aaaaaa !important; }
.hljs-bullet { color: #999999 !important; }
.hljs-emphasis { font-style: italic; }
.hljs-strong { font-weight: bold; }
</style>
<style>
:root {
  --bg: #282c34;
  --surface: #2c3038;
  --surface2: #353a44;
  --border: #3e424d;
  --text: #f0f0f0;
  --text2: #b0b0b0;
  --accent: #448;
  --accent2: #8ae;
  --green: #4c4;
  --red: #e44;
  --orange: #fa4;
  --radius: 8px;
  --font: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
  --ui-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--ui-font);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
header h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
header h1 span { color: var(--accent2); }
header .actions { display: flex; gap: 8px; }

/* Layout */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Sidebar */
.sidebar {
  width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.sidebar-header {
  padding: 12px 16px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
}
.agent-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}
.agent-item {
  padding: 8px 16px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
  border-left: 3px solid transparent;
}
.agent-item:hover { background: var(--surface2); color: var(--text); }
.agent-item.active {
  background: var(--surface2);
  color: var(--text);
  border-left-color: var(--accent);
}
.agent-item .icon { font-size: 14px; opacity: 0.6; }
.agent-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.agent-item .badge {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 10px;
  background: var(--surface2);
  color: var(--text2);
}
.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text2);
}

/* Main */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  background: var(--bg);
}
.main-placeholder {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text2);
  font-size: 14px;
}
.main-placeholder .inner { text-align: center; }
.main-placeholder .inner .big-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }

/* Tabs */
.tab-bar {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tab-btn {
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 500;
  background: none;
  border: none;
  color: var(--text2);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  font-family: var(--ui-font);
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  color: var(--accent2);
  border-bottom-color: var(--accent);
}
#mainContent { min-height: 0; }
.tab-content { flex: 1; overflow-y: auto; display: none; padding: 20px; min-height: 0; }
.tab-content.active { display: block; }

/* View Tab */
.code-view {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.6;
  overflow: auto;
  margin: 0;
  border: none;
}
.code-view code {
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
  padding: 0;
}
.code-view .line-number {
  display: inline-block;
  width: 32px;
  color: var(--text2);
  opacity: 0.5;
  user-select: none;
}

/* Edit Tab */
.edit-area {
  width: 100%;
  min-height: 400px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.6;
  padding: 16px;
  resize: vertical;
  outline: none;
}
.edit-area:focus { border-color: var(--accent); }

/* Input specs */
.input-specs {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 12px;
  padding: 12px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.input-specs .spec-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.input-specs .spec-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent2);
  min-width: 100px;
  white-space: nowrap;
}
.input-specs .spec-type {
  font-size: 10px;
  color: var(--text2);
  background: var(--surface2);
  padding: 2px 8px;
  border-radius: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.input-specs input, .input-specs textarea {
  flex: 1;
  padding: 8px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 13px;
  font-family: var(--ui-font);
  outline: none;
}
.input-specs textarea { min-height: 60px; resize: vertical; font-family: var(--font); font-size: 12px; }
.input-specs input:focus, .input-specs textarea:focus { border-color: var(--accent); }

/* Run Tab */
.run-prompt-area {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.run-prompt-area input {
  flex: 1;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 13px;
  font-family: var(--ui-font);
  outline: none;
}
.run-prompt-area input:focus { border-color: var(--accent); }
.run-output {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
  overflow: auto;
}
.run-output .reg-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font);
  font-size: 12px;
}
.run-output .reg-table th, .run-output .reg-table td {
  padding: 6px 10px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.run-output .reg-table th {
  color: var(--text2);
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.run-output .reg-table td { color: var(--text); word-break: break-all; }
.run-output .reg-table tr:hover td { background: var(--surface2); }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius);
  border: none;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--ui-font);
  text-decoration: none;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-secondary { background: var(--surface2); color: var(--text); }
.btn-secondary:hover { background: var(--border); }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { opacity: 0.85; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Guide View */
.guide-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.guide-view-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 15px;
  font-weight: 600;
  flex-shrink: 0;
}
.guide-view-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
}
.guide-view-body h1, .guide-view-body h2, .guide-view-body h3 { color: var(--accent2); margin: 1.4em 0 0.6em; }
.guide-view-body h2 { border-bottom: 1px solid var(--border); padding-bottom: 6px; }
.guide-view-body h1 { font-size: 22px; }
.guide-view-body h2 { font-size: 18px; }
.guide-view-body h3 { font-size: 15px; }
.guide-view-body p { margin: 0.7em 0; }
.guide-view-body code {
  background: var(--surface2);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: var(--font);
  font-size: 13px;
  color: var(--orange);
}
.guide-view-body pre {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px 16px;
  overflow-x: auto;
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.5;
}
.guide-view-body pre code { background: none; padding: 0; color: var(--text); }
.guide-view-body table { border-collapse: collapse; width: 100%; margin: 1em 0; }
.guide-view-body th, .guide-view-body td {
  padding: 8px 12px;
  border: 1px solid var(--border);
  text-align: left;
  font-size: 13px;
}
.guide-view-body th { background: var(--surface2); color: var(--text2); font-weight: 600; }
.guide-view-body ul, .guide-view-body ol { padding-left: 24px; margin: 0.6em 0; }
.guide-view-body li { margin: 0.3em 0; }
.guide-view-body a { color: var(--accent2); }
.guide-view-body a:hover { color: var(--accent); }
.guide-view-body hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }
.guide-view-body blockquote {
  border-left: 3px solid var(--accent);
  padding: 8px 16px;
  margin: 1em 0;
  background: var(--surface2);
  border-radius: 0 6px 6px 0;
  color: var(--text2);
}
.guide-spinner { text-align: center; padding: 40px; color: var(--text2); }

/* Chat Panel */
.chat-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin: 12px 20px;
  max-width: 640px;
  display: flex;
  flex-direction: column;
  max-height: 480px;
}
.chat-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  font-weight: 600;
}
.chat-header button {
  background: none;
  border: none;
  color: var(--text2);
  cursor: pointer;
  font-size: 18px;
  padding: 2px 6px;
  border-radius: 4px;
}
.chat-header button:hover { color: var(--text); background: var(--surface2); }
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 200px;
}
.chat-msg {
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13px;
  line-height: 1.5;
  max-width: 85%;
  word-wrap: break-word;
}
.chat-msg.user {
  background: var(--accent);
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.chat-msg.system {
  background: var(--surface2);
  color: var(--text);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.chat-msg.system .agent-result {
  margin-top: 8px;
  padding: 8px 10px;
  background: var(--bg);
  border-radius: 6px;
  font-family: var(--font);
  font-size: 12px;
  white-space: pre-wrap;
  max-height: 200px;
  overflow: auto;
}
.chat-msg.system .agent-actions {
  margin-top: 8px;
  display: flex;
  gap: 6px;
}
.chat-msg.system .agent-name {
  font-weight: 600;
  color: var(--accent2);
  margin-bottom: 4px;
}
.chat-input-area {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
}
.chat-input-area textarea {
  flex: 1;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--ui-font);
  font-size: 13px;
  resize: none;
  outline: none;
  min-height: 40px;
  max-height: 120px;
}
.chat-input-area textarea:focus { border-color: var(--accent); }
.chat-input-area .btn { align-self: flex-end; }
.chat-spinner {
  align-self: flex-start;
  padding: 10px 14px;
  background: var(--surface2);
  border-radius: 10px;
  border-bottom-left-radius: 4px;
  font-size: 13px;
  color: var(--text2);
}

/* Status / Toast */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--surface2);
  color: var(--text);
  padding: 10px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  border: 1px solid var(--border);
  z-index: 200;
  opacity: 0;
  transition: all 0.3s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { border-color: var(--red); }
.toast.success { border-color: var(--green); }

/* Spinner */
.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid var(--text2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Token info */
.token-info {
  font-size: 11px;
  color: var(--text2);
  margin-top: 8px;
  padding: 6px 10px;
  background: var(--surface2);
  border-radius: var(--radius);
  display: inline-block;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text2); }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px;
  color: var(--text2);
}
.empty-state .icon { font-size: 36px; margin-bottom: 12px; opacity: 0.3; }
.empty-state p { font-size: 13px; line-height: 1.6; }

/* Loading overlay on agent list */
.loading-dots::after {
  content: '';
  animation: dots 1.5s steps(4, end) infinite;
}
@keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }
</style>
</head>
<body>

<header>
  <h1><a href="https://github.com/day50-dev/structured-skills" target="_blank" style="color:inherit;text-decoration:none"><span>◈</span> strusky</a></h1>
  <div class="actions">
    <a class="btn btn-secondary" href="#guide">Guide</a>
    <button class="btn btn-primary" onclick="showCreatePanel()">+ New Agent</button>
    <button class="btn btn-secondary" onclick="refreshList()">⟳</button>
  </div>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">Agents</div>
    <div class="agent-list" id="agentList"></div>
    <div class="sidebar-footer" id="agentCount">0 agents</div>
  </aside>

  <!-- Main -->
  <main class="main">
    <!-- Chat Panel (inside main, sidebar-unaffecting) -->
    <div class="chat-panel" id="chatPanel" style="display:none">
      <div class="chat-header">
        <span>Create Agent</span>
        <button onclick="hideCreatePanel()" title="Close">✕</button>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <textarea id="chatInput" placeholder="Describe the agent you want..." rows="2" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMessage()}"></textarea>
        <button class="btn btn-primary" onclick="sendChatMessage()" id="chatSendBtn">Send</button>
      </div>
    </div>
    <div class="guide-view" id="guideView" style="display:none">
      <div class="guide-view-header">
        <span>Guide</span>
      </div>
      <div class="guide-view-body" id="guideBody">
        <div class="guide-spinner"><span class="spinner"></span> Loading...</div>
      </div>
    </div>
    <div class="main-placeholder" id="placeholder">
      <div class="inner">
        <div class="big-icon">◈</div>
        <p>Select an agent from the sidebar</p>
        <p style="font-size:12px;margin-top:8px;opacity:0.6">or create a new one</p>
      </div>
    </div>

    <div id="mainContent" style="display:none;flex:1;display:none;flex-direction:column">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('view')" id="tabView">View</button>
        <button class="tab-btn" onclick="switchTab('edit')" id="tabEdit">Edit</button>
      </div>

      <!-- View -->
      <div class="tab-content active" id="panelView">
        <div id="viewHeader" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <span id="viewName" style="font-size:15px;font-weight:600"></span>
          <span id="viewPath" style="font-size:11px;color:var(--text2)"></span>
        </div>
        <pre class="code-view"><code class="language-python" id="codeView"></code></pre>
        <div style="margin-top:16px">
          <div id="inputSpecs" class="input-specs" style="display:none"></div>
          <div class="run-prompt-area">
            <input type="text" id="runPrompt" placeholder="Enter prompt for the agent..." onkeydown="if(event.key==='Enter') runAgent()">
            <button class="btn btn-primary" onclick="runAgent()" id="runBtn">Run</button>
          </div>
          <div id="runOutputArea" style="display:none">
            <div id="runProgress" style="display:none;margin-bottom:8px;padding:8px 12px;background:var(--surface2);border-radius:var(--radius);font-family:var(--font);font-size:12px;line-height:1.5;white-space:pre-wrap;color:var(--text2)"></div>
            <div id="runTokens" class="token-info"></div>
            <div class="run-output" id="runOutput"></div>
          </div>
        </div>
      </div>

      <!-- Edit -->
      <div class="tab-content" id="panelEdit">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <span style="font-size:15px;font-weight:600">Edit</span>
          <div style="display:flex;gap:8px">
            <button class="btn btn-secondary btn-sm" onclick="showEditHistory()" id="editHistBtn">History</button>
            <button class="btn btn-primary btn-sm" onclick="saveAgent()" id="saveBtn">Save</button>
            <button class="btn btn-secondary btn-sm" onclick="switchTab('view')">Cancel</button>
          </div>
        </div>
        <div id="editHistPanel" style="display:none;margin-bottom:8px;background:var(--surface2);border-radius:var(--radius);max-height:200px;overflow-y:auto;padding:8px;font-family:var(--font);font-size:12px;border:1px solid var(--border)"></div>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <input type="text" id="modifyPrompt" placeholder="Tell the AI how to modify this agent..." style="flex:1;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:var(--ui-font);outline:none" onkeydown="if(event.key==='Enter') modifyAgent()">
          <button class="btn btn-secondary btn-sm" onclick="modifyAgent()" id="modifyBtn">Modify</button>
        </div>
        <div id="modifyOutput" style="display:none;margin-bottom:8px;background:var(--surface2);border-radius:var(--radius);max-height:160px;overflow-y:auto;padding:10px 14px;font-family:var(--font);font-size:12px;line-height:1.5;white-space:pre-wrap;color:var(--text2)"></div>
        <textarea class="edit-area" id="editArea" spellcheck="false"></textarea>
      </div>

    </div>
  </main>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.4/marked.min.js"></script>
<script src="strusky.js"></script>
<script>
// State
let agents = [];
let currentAgent = null;
let currentTab = 'view';
let currentInputSpecs = [];

// Init
document.addEventListener('DOMContentLoaded', () => {
  refreshList();
  window.addEventListener('hashchange', handleHash);
  handleHash();
});

// API helpers
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(path, opts);
  return res.json();
}

// Agent list
async function refreshList() {
  const list = document.getElementById('agentList');
  list.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text2);font-size:12px"><span class="spinner"></span></div>';
  const data = await api('GET', '/api/agents');
  agents = data.agents || [];
  renderList();
  if (currentAgent) {
    const stillExists = agents.find(a => a.name === currentAgent.name);
    if (!stillExists) {
      clearMain();
    } else {
      selectAgent(currentAgent.name);
    }
  }
}

function renderList() {
  const list = document.getElementById('agentList');
  document.getElementById('agentCount').textContent = `${agents.length} agent${agents.length !== 1 ? 's' : ''}`;
  if (agents.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">◈</div><p>No agents yet.<br>Create one to get started.</p></div>';
    return;
  }
  list.innerHTML = agents.map(a => {
    const active = currentAgent && a.name === currentAgent.name ? 'active' : '';
    const icon = a.path.startsWith('examples') ? '📖' : a.path.startsWith('agents') ? '⚡' : '📄';
    return `<div class="agent-item ${active}" onclick="selectAgent('${a.name}')">
      <span class="icon">${icon}</span>
      <span class="name">${escHtml(a.name)}</span>
    </div>`;
  }).join('');
}

// Agent selection
let _selecting = false;
async function selectAgent(name) {
  hideCreatePanel();
  hideGuide();
  const data = await api('GET', `/api/agents/${encodeURIComponent(name)}`);
  if (data.error) { showToast(data.error, 'error'); return; }
  _selecting = true;
  location.hash = '#view/agent/' + encodeURIComponent(name);
  currentAgent = data;
  currentInputSpecs = strusky.parseInputSpecs(data.content);
  document.getElementById('placeholder').style.display = 'none';
  const mc = document.getElementById('mainContent');
  mc.style.display = 'flex';
  document.getElementById('viewName').textContent = data.name;
  document.getElementById('viewPath').textContent = data.path + (data.editable ? '' : ' (read-only)');

  // Edit area
  document.getElementById('editArea').value = data.content;

  // Render input spec fields
  renderInputSpecs();

  // Clear run output
  document.getElementById('runOutputArea').style.display = 'none';
  document.getElementById('runPrompt').value = '';

  renderList();
  switchTab(currentTab);
  // Highlight code view (after tab switch so element is visible)
  const codeEl = document.getElementById('codeView');
  codeEl.textContent = data.content;
  requestAnimationFrame(() => {
    try { hljs.highlightElement(codeEl); } catch (e) { console.warn('highlight:', e); }
  });
  _selecting = false;
}

function renderInputSpecs() {
  const container = document.getElementById('inputSpecs');
  if (!currentInputSpecs || currentInputSpecs.length === 0) {
    container.style.display = 'none';
    return;
  }
  const agentKey = currentAgent ? currentAgent.name : '_';
  let html = '';
  for (const spec of currentInputSpecs) {
    const id = 'input_' + escHtml(spec.name);
    const listId = id + '_list';
    const history = _getInputHistory(agentKey, spec.name);
    const lastVal = history.length > 0 ? escHtml(history[0]) : '';
    if (spec.type === 'file') {
      html += `<div class="spec-row">
        <span class="spec-label">${escHtml(spec.name)}</span>
        <span class="spec-type">file</span>
        <textarea id="${id}" placeholder="Paste file content or enter path..." rows="2">${lastVal}</textarea>
      </div>`;
    } else {
      html += `<div class="spec-row">
        <span class="spec-label">${escHtml(spec.name)}</span>
        <span class="spec-type">${escHtml(spec.type)}</span>
        <input id="${id}" type="${spec.type === 'number' ? 'number' : 'text'}" placeholder="Enter ${spec.type} value..." list="${listId}" autocomplete="off" value="${lastVal}">
        <datalist id="${listId}">${history.map(v => `<option value="${escHtml(v)}">`).join('')}</datalist>
      </div>`;
    }
  }
  container.innerHTML = html;
  container.style.display = '';
}

function clearMain() {
  currentAgent = null;
  hideGuide();
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('mainContent').style.display = 'none';
  if (location.hash) location.hash = '';
  renderList();
}

// Tabs
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active');
  document.getElementById(`panel${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active');
  if (currentAgent && !_selecting) {
    history.replaceState(null, '', `#${tab}/agent/${encodeURIComponent(currentAgent.name)}`);
  }
}

// Guide
let guideLoaded = false;
async function showGuide() {
  const h = document.getElementById('guideView');
  h.style.display = 'flex';
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('mainContent').style.display = 'none';
  if (!guideLoaded) {
    guideLoaded = true;
    try {
      const data = await api('GET', '/api/guide');
      if (data.error) { document.getElementById('guideBody').innerHTML = '<p>Guide not available.</p>'; return; }
      document.getElementById('guideBody').innerHTML = marked.parse(data.content);
    } catch (e) {
      document.getElementById('guideBody').innerHTML = '<p>Failed to load guide.</p>';
    }
  }
}

function hideGuide() {
  document.getElementById('guideView').style.display = 'none';
}

function handleHash() {
  if (_selecting) return;
  const hash = location.hash.slice(1);
  if (hash === 'guide') {
    showGuide();
  } else {
    let tab = 'view';
    let agentName = null;
    let h = hash;
    if (h.startsWith('view/')) { tab = 'view'; h = h.slice(5); }
    else if (h.startsWith('edit/')) { tab = 'edit'; h = h.slice(5); }
    if (h.startsWith('agent/')) {
      agentName = decodeURIComponent(h.slice(6));
    }
    if (agentName) {
      selectAgent(agentName);
      switchTab(tab);
    } else {
      hideGuide();
      if (!currentAgent) {
        document.getElementById('placeholder').style.display = 'flex';
        document.getElementById('mainContent').style.display = 'none';
      } else {
        document.getElementById('mainContent').style.display = 'flex';
      }
    }
  }
}

// Chat create agent
function showCreatePanel() {
  const panel = document.getElementById('chatPanel');
  panel.style.display = '';
  const msgs = document.getElementById('chatMessages');
  msgs.innerHTML = '';
  addChatMessage('system', 'Describe the agent you want and I\'ll generate it for you.');
  document.getElementById('chatInput').focus();
}

function hideCreatePanel() {
  document.getElementById('chatPanel').style.display = 'none';
}

function addChatMessage(role, text, agent) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  if (role === 'system' && agent) {
    const nameDiv = document.createElement('div');
    nameDiv.className = 'agent-name';
    nameDiv.textContent = '⚡ ' + agent.name + '.ss';
    const pre = document.createElement('pre');
    pre.className = 'agent-result';
    pre.textContent = agent.content;
    const actions = document.createElement('div');
    actions.className = 'agent-actions';
    const btn = document.createElement('button');
    btn.className = 'btn btn-primary btn-sm';
    btn.textContent = 'Accept';
    btn.addEventListener('click', () => acceptChatAgent(agent.name));
    actions.appendChild(btn);
    div.appendChild(nameDiv);
    div.appendChild(pre);
    div.appendChild(actions);
  } else {
    div.textContent = text;
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addChatSpinner() {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-spinner';
  div.id = 'chatSpinner';
  div.innerHTML = '<span class="spinner"></span> Generating...';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeChatSpinner() {
  const s = document.getElementById('chatSpinner');
  if (s) s.remove();
}

async function sendChatMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  addChatMessage('user', text);
  addChatSpinner();
  const btn = document.getElementById('chatSendBtn');
  btn.disabled = true;
  try {
    const data = await api('POST', '/api/agents', { prompt: text });
    removeChatSpinner();
    if (data.error) {
      addChatMessage('system', 'Error: ' + data.error);
      return;
    }
    addChatMessage('system', '', { name: data.name, content: data.content });
  } catch (e) {
    removeChatSpinner();
    addChatMessage('system', 'Failed to create agent. Is the server running?');
  } finally {
    btn.disabled = false;
    document.getElementById('chatInput').focus();
  }
}

async function acceptChatAgent(name) {
  hideCreatePanel();
  showToast(`Accepted ${name}.ss`, 'success');
  await refreshList();
  selectAgent(name);
}

// Modify with AI
async function modifyAgent() {
  if (!currentAgent) return;
  const instruction = document.getElementById('modifyPrompt').value.trim();
  if (!instruction) { showToast('Enter a modification instruction', 'error'); return; }
  const outputEl = document.getElementById('modifyOutput');
  const btn = document.getElementById('modifyBtn');
  outputEl.textContent = '';
  outputEl.style.display = '';
  btn.disabled = true;
  try {
    const res = await fetch(`/api/agents/${encodeURIComponent(currentAgent.name)}/modify-stream`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ instruction }),
    });
    if (!res.ok) { showToast('Failed to modify agent', 'error'); return; }
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullScript = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            if (data.type === 'reasoning') {
              outputEl.textContent += data.token;
              outputEl.scrollTop = outputEl.scrollHeight;
            } else if (data.type === 'token') {
              outputEl.textContent += data.token;
              outputEl.scrollTop = outputEl.scrollHeight;
            } else if (data.type === 'done') {
              fullScript = data.script;
              if (data.tokens) {
                showToast(`Modified — ${data.tokens.prompt} in → ${data.tokens.completion} out`, 'success');
              } else {
                showToast('Modified', 'success');
              }
            } else if (data.type === 'error') {
              showToast(data.error || 'Modification failed', 'error');
            }
          } catch (e) {
            // skip malformed line
          }
        }
      }
    }
    if (fullScript) {
      document.getElementById('editArea').value = fullScript;
      currentAgent.content = fullScript;
      // Update code view
      const codeEl = document.getElementById('codeView');
      codeEl.textContent = fullScript;
      requestAnimationFrame(() => {
        try { hljs.highlightElement(codeEl); } catch (e) { console.warn('highlight:', e); }
      });
      // auto-save
      if (currentAgent.editable) {
        await api('PUT', `/api/agents/${encodeURIComponent(currentAgent.name)}`, { content: fullScript, message: instruction });
      }
    }
  } catch (e) {
    showToast('Failed to modify agent', 'error');
  } finally {
    outputEl.style.display = 'none';
    btn.disabled = false;
  }
}

// Edit history (localStorage)
function _editHistKey(agentName) {
  return 'strusky_edit_hist_' + agentName;
}

function _getEditHistory(agentName) {
  try {
    return JSON.parse(localStorage.getItem(_editHistKey(agentName)) || '[]');
  } catch { return []; }
}

function _pushEditHistory(agentName, content) {
  if (!content) return;
  try {
    const key = _editHistKey(agentName);
    let history = JSON.parse(localStorage.getItem(key) || '[]');
    const entry = { content, saved: Date.now() };
    // Don't duplicate identical content
    if (history.length > 0 && history[0].content === content) return;
    history = [entry, ...history].slice(0, 20);
    localStorage.setItem(key, JSON.stringify(history));
  } catch { /* ignore */ }
}

function showEditHistory() {
  if (!currentAgent) return;
  const panel = document.getElementById('editHistPanel');
  const history = _getEditHistory(currentAgent.name);
  if (history.length === 0) {
    panel.innerHTML = '<div style="padding:8px;color:var(--text2)">No saved versions yet.</div>';
    panel.style.display = panel.style.display === 'none' ? '' : 'none';
    return;
  }
  panel.style.display = panel.style.display === 'none' ? '' : 'none';
  if (panel.style.display === 'none') return;
  let html = '<div style="display:flex;flex-direction:column;gap:4px">';
  for (let i = 0; i < history.length; i++) {
    const entry = history[i];
    const preview = entry.content.replace(/\n/g, '↵ ').slice(0, 80);
    const time = new Date(entry.saved).toLocaleString();
    const escPrev = escHtml(preview);
    html += `<div onclick="restoreEditHistory(${i})" style="cursor:pointer;padding:6px 8px;border-radius:4px;background:var(--bg);display:flex;gap:8px;align-items:center" onmouseover="this.style.background='var(--surface)'" onmouseout="this.style.background='var(--bg)'">
      <span style="color:var(--text2);white-space:nowrap;font-size:11px">${time}</span>
      <code style="flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escPrev}</code>
    </div>`;
  }
  html += '</div>';
  panel.innerHTML = html;
}

function restoreEditHistory(index) {
  if (!currentAgent) return;
  const history = _getEditHistory(currentAgent.name);
  if (!history[index]) return;
  document.getElementById('editArea').value = history[index].content;
  document.getElementById('editHistPanel').style.display = 'none';
  showToast('Version restored', 'success');
}

// Edit / Save
async function saveAgent() {
  if (!currentAgent || !currentAgent.editable) return;
  const content = document.getElementById('editArea').value;
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Saving...';
  try {
    const data = await api('PUT', `/api/agents/${encodeURIComponent(currentAgent.name)}`, { content });
    if (data.error) { showToast(data.error, 'error'); return; }
    _pushEditHistory(currentAgent.name, content);
    currentAgent.content = content;
    showToast('Saved', 'success');
    switchTab('view');
    const ce = document.getElementById('codeView');
    ce.textContent = content;
    requestAnimationFrame(() => {
      try { hljs.highlightElement(ce); } catch (e) { console.warn('highlight:', e); }
    });
  } catch (e) {
    showToast('Failed to save', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save';
  }
}

// Input history (localStorage)
function _inputHistoryKey(agentKey, specName) {
  return 'strusky_input_' + agentKey + '_' + specName;
}

function _getInputHistory(agentKey, specName) {
  try {
    return JSON.parse(localStorage.getItem(_inputHistoryKey(agentKey, specName)) || '[]');
  } catch { return []; }
}

function _saveInputHistory(agentKey, specName, value) {
  if (!value) return;
  try {
    const key = _inputHistoryKey(agentKey, specName);
    let history = JSON.parse(localStorage.getItem(key) || '[]');
    history = [value, ...history.filter(v => v !== value)].slice(0, 10);
    localStorage.setItem(key, JSON.stringify(history));
  } catch { /* ignore */ }
}

// Run
async function runAgent() {
  if (!currentAgent) return;
  const prompt = document.getElementById('runPrompt').value.trim();
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Running...';
  document.getElementById('runOutputArea').style.display = 'none';

  // Collect input spec values
  const inputs = {};
  if (currentInputSpecs) {
    for (const spec of currentInputSpecs) {
      const el = document.getElementById('input_' + spec.name);
      if (el) inputs[spec.name] = el.value;
    }
  }

  try {
    const body = { inputs };
    if (prompt) body.prompt = prompt;
    const data = await api('POST', `/api/agents/${encodeURIComponent(currentAgent.name)}/run`, body);
    if (data.error) { showToast(data.error, 'error'); return; }
    displayRunOutput(data.registers || {}, data.tokens, data.progress || '');
    // Save input history on success
    const agentKey = currentAgent.name;
    for (const spec of currentInputSpecs || []) {
      _saveInputHistory(agentKey, spec.name, inputs[spec.name]);
    }
  } catch (e) {
    showToast('Failed to run agent', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Run';
  }
}

function displayRunOutput(registers, tokens, progress) {
  const area = document.getElementById('runOutputArea');
  area.style.display = 'block';

  // Progress
  const prog = document.getElementById('runProgress');
  if (progress) {
    prog.textContent = progress;
    prog.style.display = '';
  } else {
    prog.style.display = 'none';
  }

  // Tokens
  if (tokens) {
    const arr = Array.isArray(tokens) ? tokens : [tokens];
    const totalPrompt = arr.reduce((s, t) => s + (t.prompt || 0), 0);
    const totalCompletion = arr.reduce((s, t) => s + (t.completion || 0), 0);
    const total = arr.reduce((s, t) => s + (t.total || 0), 0);
    if (total) {
      document.getElementById('runTokens').textContent = `⚡ ${totalPrompt} in → ${totalCompletion} out → ${total} total`;
      document.getElementById('runTokens').style.display = 'inline-block';
    } else {
      document.getElementById('runTokens').style.display = 'none';
    }
  } else {
    document.getElementById('runTokens').style.display = 'none';
  }

  // Registers
  const out = document.getElementById('runOutput');
  const keys = Object.keys(registers);
  if (keys.length === 0) {
    out.textContent = '(no registers)';
    return;
  }
  let html = '<table class="reg-table"><thead><tr><th>Register</th><th>Value</th></tr></thead><tbody>';
  for (const key of keys) {
    const val = String(registers[key]);
    const display = val.length > 1000 ? val.slice(0, 997) + '...' : val;
    html += `<tr><td style="white-space:nowrap;color:var(--accent2)">${escHtml(key)}</td><td>${escHtml(display)}</td></tr>`;
  }
  html += '</tbody></table>';
  out.innerHTML = html;
}

// Toast
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || '') + ' show';
  clearTimeout(t._hide);
  t._hide = setTimeout(() => t.classList.remove('show'), 3000);
}

// Util
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
